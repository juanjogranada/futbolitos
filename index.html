<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta Partidos La Liga</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#141E30,#243B55);
    color:white;
    margin:0;
}

.container{
    width:1000px;
    margin:auto;
    margin-top:30px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header img{
    width:80px;
}

.form-box{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

input,select{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
    width:100%;
}

select{
    height:140px;
}

button{
    background:#ff4b2b;
    border:none;
    color:white;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    width:100%;
}

button:hover{
    background:#e6391d;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#222;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
}

.team img{
    width:28px;
}

.status{
    font-weight:bold;
}

.status.FINISHED{color:#444;}
.status.LIVE{color:red;}
.status.IN_PLAY{color:red;}
.status.PAUSED{color:orange;}
.status.SCHEDULED{color:#007bff;}

</style>

</head>
<body>

<div class="container">

<div class="header">
<img src="https://crests.football-data.org/laliga.png">
<h1>Partidos de La Liga</h1>
</div>

<div class="form-box">

<div class="form-row">
<div>
<label>Fecha desde</label>
<input type="date" id="dateFrom">
</div>

<div>
<label>Fecha hasta</label>
<input type="date" id="dateTo">
</div>
</div>

<div class="form-row">
<div>
<label>Estado del partido (puedes seleccionar varios)</label>
<select id="status" multiple>

<option value="SCHEDULED">SCHEDULED</option>
<option value="LIVE">LIVE</option>
<option value="IN_PLAY">IN_PLAY</option>
<option value="PAUSED">PAUSED</option>
<option value="FINISHED">FINISHED</option>
<option value="POSTPONED">POSTPONED</option>
<option value="SUSPENDED">SUSPENDED</option>
<option value="CANCELLED">CANCELLED</option>

</select>
</div>
</div>

<button onclick="buscarPartidos()">Buscar partidos</button>

</div>

<table id="tablaResultados">

<thead>
<tr>
<th>Fecha</th>
<th>Estado</th>
<th>Local</th>
<th>Visitante</th>
<th>Resultado</th>
<th>Árbitro</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const API_KEY="TU_API_KEY";
const SEASON=2025;

function fechaHoy(){
    let today=new Date().toISOString().split("T")[0];
    document.getElementById("dateFrom").value=today;
    document.getElementById("dateTo").value=today;
}

fechaHoy();

function obtenerEstadosSeleccionados(){

    let select=document.getElementById("status");
    let seleccionados=[];

    for(let option of select.options){
        if(option.selected){
            seleccionados.push(option.value);
        }
    }

    return seleccionados.join(",");
}

async function buscarPartidos(){

    let dateFrom=document.getElementById("dateFrom").value;
    let dateTo=document.getElementById("dateTo").value;
    let status=obtenerEstadosSeleccionados();

    let url='/.netlify/functions/matches?dateFrom=${dateFrom}&dateTo=${dateTo}&status=${status}';

    let response=await fetch(url);

    let data=await response.json();

    pintarResultados(data.matches);

}

function pintarResultados(matches){

    let tbody=document.querySelector("#tablaResultados tbody");
    tbody.innerHTML="";

    matches.forEach(match=>{

        let fecha=new Date(match.utcDate).toLocaleString();

        let resultado="-";

        if(match.score.fullTime.home!==null){
            resultado=match.score.fullTime.home+" - "+match.score.fullTime.away;
        }

        let arbitro="N/D";

        if(match.referees.length>0){
            arbitro=match.referees[0].name;
        }

        let fila=`

        <tr>

        <td>${fecha}</td>

        <td class="status ${match.status}">
        ${match.status}
        </td>

        <td>
        <div class="team">
        <img src="${match.homeTeam.crest}">
        ${match.homeTeam.name}
        </div>
        </td>

        <td>
        <div class="team">
        <img src="${match.awayTeam.crest}">
        ${match.awayTeam.name}
        </div>
        </td>

        <td>${resultado}</td>

        <td>${arbitro}</td>

        </tr>
        `;

        tbody.innerHTML+=fila;

    });

}

</script>

</body>
</html>
